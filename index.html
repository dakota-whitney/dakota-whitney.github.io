<!DOCTYPE html>
<html>
    <head>
        <title>Dakota's Projects</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- AdminLTE 4 + Bootstrap 5.3 (CSS) -->
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" 
        />

        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" 
        />

        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" 
        />

        <!--Global CSS-->
        <link
            rel="stylesheet" 
            href="styles.css"
        />
    </head>
    <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

        <!--Bootstrap spinner-->
        <div class="spinner-border position-absolute z-1" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>

        <div class="app-wrapper">

            <!-- Header -->
            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                                <i class="bi bi-list"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Sidebar -->
            <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
                <div class="sidebar-brand">
                    <a href="#" class="brand-link">
                        <span class="brand-text fw-light"></span>
                    </a>
                </div>
                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu">
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- Main content -->
            <main class="app-main">
                <div class="app-content-header">

                    <!--Repository failure alert-->
                    <div class="alert alert-warning d-none" role="alert">
                        Failed to load repositories. Please try again later.
                    </div>
                    
                </div>
                <div class="app-content">
                    <div id="repo" class="container-fluid"></div>
                </div>
            </main>

        </div>
        
        <!-- Bootstrap + Popper + AdminLTE (JS) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

        <!-- DOMPurify -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.1/dist/purify.min.js"></script>

        <!-- Entry script -->
         <script src="./index.js" type="module"></script>
    </body>
</html>
