<!DOCTYPE html>
<html>
<head>
    <title>Dakota's Projects</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Bootstrap CSS 5.3.8-->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous"
    >

    <!--Bootstrap Icons 1.13.1-->
    <link 
        rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >

    <!--Global CSS-->
    <link
        rel="stylesheet" 
        href="styles.css"
    >
</head>
<body>
    <!--Nav toggler icon-->
    <i class="bi bi-list text-white z-1 position-fixed"></i>

    <!--Main content-->
    <main class="d-flex flex-row">

        <!--Navbar-->
        <nav class="vh-100 bg-dark shadow">
            <ul class="nav h-100 flex-column justify-content-evenly"></ul>
        </nav>

        <!--Bootstrap spinner-->
        <div class="spinner-border d-none position-absolute" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>

        <!--Repository container-->
        <div id="repo" class="w-100 overflow-scroll overflow-x-hidden">

            <!--Repository failure alert-->
            <div class="alert alert-warning d-none" role="alert">
                Failed to load repositories. Please try again later.
            </div>
        </div>
    </main>

    <!--Boostrap 5.3.8 JavaScript-->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous">
    </script>

    <!--DOMPurify-->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.1/dist/purify.min.js"></script>

    <!--Global JavaScript-->
    <script src="./index.js" type="module"></script>
</body>
</html>
